server:
  port: 8080

spring:
  application:
    name: berkay-hub-backend
  datasource:
    url: jdbc:sqlite:data/berkay-hub.sqlite
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

berkay-hub:
  reports:
    storage-path: ${BERKAY_HUB_REPORT_DIR:data/reports}
  google-calendar:
    client-id: ${GOOGLE_CALENDAR_CLIENT_ID:}
    client-secret: ${GOOGLE_CALENDAR_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_CALENDAR_REDIRECT_URI:http://localhost:8080/api/google-calendar/oauth/callback}
    token-secret: ${BERKAY_HUB_GOOGLE_TOKEN_SECRET:}
    frontend-callback-url: ${BERKAY_HUB_FRONTEND_URL:http://localhost:5500/modules/academic-planner/index.html}
    time-zone: ${BERKAY_HUB_TIME_ZONE:Europe/Istanbul}
    allowed-return-origins:
      - http://localhost:5500
      - http://127.0.0.1:5500
  cors:
    allowed-origins:
      - http://localhost:5500
      - http://127.0.0.1:5500
      - http://localhost:3000
      - http://127.0.0.1:3000
