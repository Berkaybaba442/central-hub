server:
  port: 8080

spring:
  application:
    name: berkay-hub-backend
  datasource:
    url: jdbc:sqlite:data/berkay-hub.sqlite
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

berkay-hub:
  cors:
    allowed-origins:
      - http://localhost:5500
      - http://127.0.0.1:5500
      - http://localhost:3000
      - http://127.0.0.1:3000
