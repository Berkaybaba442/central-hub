services:
  backend:
    build: ../berkay-hub-backend
    container_name: berkay-hub-backend
    environment:
      GOOGLE_CALENDAR_CLIENT_ID: ${GOOGLE_CALENDAR_CLIENT_ID:-}
      GOOGLE_CALENDAR_CLIENT_SECRET: ${GOOGLE_CALENDAR_CLIENT_SECRET:-}
      GOOGLE_CALENDAR_REDIRECT_URI: ${GOOGLE_CALENDAR_REDIRECT_URI:-http://localhost:8080/api/google-calendar/oauth/callback}
      BERKAY_HUB_GOOGLE_TOKEN_SECRET: ${BERKAY_HUB_GOOGLE_TOKEN_SECRET:-}
      BERKAY_HUB_FRONTEND_URL: ${BERKAY_HUB_FRONTEND_URL:-http://localhost:5500/modules/academic-planner/index.html}
      BERKAY_HUB_TIME_ZONE: ${BERKAY_HUB_TIME_ZONE:-Europe/Istanbul}
    ports:
      - "8080:8080"
    volumes:
      - berkay_hub_data:/app/data
    restart: unless-stopped

  frontend:
    image: nginx:1.27-alpine
    container_name: berkay-hub-frontend
    ports:
      - "5500:80"
    volumes:
      - ../central-hub-frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  berkay_hub_data:
